<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI | 精神状态鉴定仪</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Microsoft YaHei', system-ui, sans-serif; }
    .neon-text { text-shadow: 0 0 10px rgb(168 85 247), 0 0 20px rgb(168 85 247); }
    .option-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .option-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-lg mx-auto min-h-screen flex flex-col">
    
    <!-- Header -->
    <div class="p-6 border-b border-zinc-800">
      <h1 class="text-3xl font-bold neon-text text-purple-400">SBTI</h1>
      <p class="text-zinc-400 mt-1">2026 精神状态鉴定仪</p>
    </div>

    <!-- Progress -->
    <div class="px-6 pt-6">
      <div class="flex justify-between text-sm text-zinc-400 mb-2">
        <span id="progress-text">1 / 12</span>
        <span class="text-purple-400">精神检测中</span>
      </div>
      <div class="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-purple-500 to-pink-500 w-1/12 transition-all duration-500"></div>
      </div>
    </div>

    <!-- Question -->
    <div class="flex-1 p-6">
      <div id="question-container">
        <div class="mb-8">
          <span class="inline-block px-4 py-1.5 bg-zinc-900 text-purple-400 text-sm rounded-full border border-purple-500/30">Question <span id="q-number">1</span></span>
        </div>
        <h2 id="question-text" class="text-2xl leading-relaxed font-medium text-zinc-100"></h2>
      </div>

      <!-- Options -->
      <div id="options" class="mt-10 space-y-4"></div>
    </div>

    <!-- Footer -->
    <div class="p-6 border-t border-zinc-800 text-center text-xs text-zinc-500">
      真实 · 扎心 · 不装
    </div>
  </div>

  <!-- Result Page (hidden initially) -->
  <div id="result-page" class="hidden fixed inset-0 bg-zinc-950 flex flex-col">
    <div class="flex-1 p-8 overflow-auto">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold neon-text text-purple-400">鉴定完成</h1>
        <p class="text-zinc-400 mt-2">你的精神状态报告</p>
      </div>
      
      <div id="result-card" class="bg-zinc-900 rounded-3xl p-8 border border-zinc-700">
        <div id="type-badge" class="inline-block px-6 py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl text-lg font-bold mb-6"></div>
        <h2 id="result-title" class="text-3xl font-bold mb-4"></h2>
        <p id="result-desc" class="text-zinc-300 leading-relaxed text-lg"></p>
        
        <div class="mt-10 grid grid-cols-3 gap-4 text-center">
          <div><div class="text-3xl font-bold text-purple-400" id="score-s">0</div><div class="text-xs text-zinc-500">直接型</div></div>
          <div><div class="text-3xl font-bold text-pink-400" id="score-l">0</div><div class="text-xs text-zinc-500">躺平型</div></div>
          <div><div class="text-3xl font-bold text-amber-400" id="score-e">0</div><div class="text-xs text-zinc-500">阴阳型</div></div>
        </div>
      </div>
    </div>

    <div class="p-6 border-t border-zinc-800">
      <button onclick="generateShareImage()" 
              class="w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-zinc-200 transition">
        <i class="fa-solid fa-share-nodes"></i> 生成朋友圈分享图
      </button>
      <button onclick="restart()" 
              class="w-full mt-4 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl transition">
        重新测试
      </button>
    </div>
  </div>

  <script>
    // ==================== 12个问题（第一版尺度）====================
    const questions = [
      {
        q: "被拉进一个陌生人拼团砍价群，天天@你帮忙助力，你会？",
        a: [
          { t: "直接退群，懒得浪费一秒钟", v: "L" },
          { t: "回一句'滚出去别@我，爱谁谁'", v: "S" },
          { t: "默默屏蔽群消息，当这群人不存在", v: "A" },
          { t: "发个'你妈死了'的表情包再退群", v: "E" }
        ]
      },
      {
        q: "亲戚在家族群里@你问'什么时候带对象回家结婚生娃啊'，你会？",
        a: [
          { t: "直接回'等你孙子结婚的时候再说'", v: "I" },
          { t: "拉黑+退出家族群，一了百了", v: "S" },
          { t: "假装没看见，继续刷视频", v: "L" },
          { t: "发'关你屁事'然后@全家嘲讽", v: "T" }
        ]
      },
      {
        q: "朋友圈有人晒新房新车还配文'普通家庭的普通幸福'，你刷到后？",
        a: [
          { t: "点赞后立刻拉黑，省得恶心", v: "S" },
          { t: "评论'凡尔赛是吧？真会玩'", v: "I" },
          { t: "心里MMP一声，划走不看", v: "L" },
          { t: "截图发到自己小群里群嘲", v: "E" }
        ]
      },
      {
        q: "老板在群里发'今晚加班，算你们加班费'但从来不给，你会？",
        a: [
          { t: "直接回'我有事走不了'然后下线", v: "S" },
          { t: "假装没看到，继续摸鱼", v: "L" },
          { t: "在心里骂一句'画大饼王八蛋'", v: "A" },
          { t: "发个'领导牛逼'的表情包阴阳", v: "I" }
        ]
      },
      {
        q: "聚餐时有人一直给你倒酒说'不喝就是不给面子'，你会？",
        a: [
          { t: "直接把杯子倒扣桌上'我不喝'", v: "S" },
          { t: "假笑说'我酒精过敏'然后继续吃菜", v: "A" },
          { t: "心里骂娘但还是喝了", v: "L" },
          { t: "回'那我就不给你面子了'直接走人", v: "E" }
        ]
      },
      {
        q: "地铁上有人大声外放短视频还抖腿，你会？",
        a: [
          { t: "瞪他一眼然后戴耳机假装听不见", v: "A" },
          { t: "直接吼'把声音关了行吗！'", v: "S" },
          { t: "拍视频发朋友圈吐槽定位", v: "E" },
          { t: "默默换个车厢，懒得吵", v: "L" }
        ]
      },
      {
        q: "前任突然点赞你三年前的朋友圈，你会？",
        a: [
          { t: "立刻拉黑删除，永不往来", v: "S" },
          { t: "点赞回去然后发'有病？'", v: "I" },
          { t: "心里恶心一下，假装没看见", v: "A" },
          { t: "截图发给闺蜜群嘲前任", v: "E" }
        ]
      },
      {
        q: "快递员半夜12点打电话催你签收，你会？",
        a: [
          { t: "接起来就骂'明天再打，老子睡了'", v: "S" },
          { t: "直接挂断然后拉黑号码", v: "L" },
          { t: "回短信'明天再说'继续睡", v: "A" },
          { t: "接起来阴阳'你妈半夜给你打电话你开心吗'", v: "I" }
        ]
      },
      {
        q: "公司团建强制要求每个人上台表演才艺，你会？",
        a: [
          { t: "直接说'我不表演，你们玩'然后坐着", v: "S" },
          { t: "找借口提前溜走", v: "L" },
          { t: "心里一万句MMP但还是上去尬演", v: "A" },
          { t: "上台唱一首《凉凉》阴阳全场", v: "E" }
        ]
      },
      {
        q: "朋友圈有人发'求赞求投票帮我冲KPI'，你会？",
        a: [
          { t: "直接屏蔽朋友圈，永不看", v: "L" },
          { t: "评论'自己努力去，别求爷爷告奶奶'", v: "S" },
          { t: "假装没看见，划走", v: "A" },
          { t: "点赞后私信'下次别发了，恶心'", v: "I" }
        ]
      },
      {
        q: "客服电话打来说'您有一笔逾期，请及时处理'其实是推销贷款，你会？",
        a: [
          { t: "接起来就骂'你全家都逾期'然后挂", v: "S" },
          { t: "直接拉黑号码永不接", v: "L" },
          { t: "礼貌说'不需要'然后挂断", v: "A" },
          { t: "接起来录音发到网上吐槽", v: "E" }
        ]
      },
      {
        q: "外卖骑手打电话让你下楼拿餐，你明明备注了放门口，他还一直催，你会？",
        a: [
          { t: "接起来就怼'备注看不懂吗？放门口就行！'", v: "S" },
          { t: "回'放门口我自己下来拿，别催了'", v: "I" },
          { t: "心里骂一句但还是下去拿", v: "L" },
          { t: "直接挂断不接，让他一直等", v: "E" }
        ]
      }
    ];

    // 8种结果类型
    const resultTypes = {
      "SSSS": { title: "社死终结者", desc: "你直接、暴躁、真实。生活里最烦的就是虚伪和浪费时间，直接开怼是你的生活方式。", color: "from-red-500 to-pink-500" },
      "LLLL": { title: "顶级躺平大师", desc: "你是真正的躺平之神。能不动就不动，能不吵就不吵，内心OS永远是：关我屁事。", color: "from-blue-500 to-cyan-500" },
      "EEEE": { title: "阴阳怪气王", desc: "你嘴上不说，心里全是损招。表面云淡风轻，实际输出顶级阴阳。", color: "from-amber-500 to-orange-500" },
      "AAAA": { title: "社恐内耗冠军", desc: "你选择默默忍受一切，然后在心里把对方骂一万遍。表面最乖，内心最卷。", color: "from-zinc-400 to-zinc-600" },
      "IIII": { title: "毒舌观察家", desc: "你看透一切，但很少直接撕破脸。喜欢用最礼貌的方式说最狠的话。", color: "from-purple-500 to-violet-500" },
      "SELI": { title: "精神分裂选手", desc: "你有时暴躁有时躺平，有时阴阳有时社恐，是个复杂而真实的人。", color: "from-purple-500 to-pink-500" },
      "SLEE": { title: "嘴硬心软型", desc: "表面凶巴巴，实际最怕麻烦。怼完人之后自己会默默反省三分钟。", color: "from-red-500 to-amber-500" },
      "MIX":  { title: "当代精神病", desc: "你就是标准的当代年轻人：又社恐又社牛，又想躺平又想内卷，精神状态永远在线。", color: "from-purple-500 to-pink-500" }
    };

    let currentQuestion = 0;
    let scores = { S:0, L:0, A:0, E:0, I:0, T:0 };

    function renderQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('q-number').textContent = currentQuestion + 1;
      document.getElementById('question-text').textContent = q.q;
      document.getElementById('progress-text').textContent = `${currentQuestion + 1} / 12`;
      document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / 12) * 100}%`;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      q.a.forEach(option => {
        const btn = document.createElement('div');
        btn.className = `option-card bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-purple-500 rounded-2xl p-5 cursor-pointer text-lg`;
        btn.innerHTML = option.t;
        btn.onclick = () => selectAnswer(option.v);
        optionsDiv.appendChild(btn);
      });
    }

    function selectAnswer(value) {
      if (value) scores[value]++;
      
      currentQuestion++;
      if (currentQuestion < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      // 简单判断主要类型
      let maxScore = Math.max(...Object.values(scores));
      let mainType = Object.keys(scores).find(key => scores[key] === maxScore) || 'MIX';
      
      let resultKey = Object.keys(resultTypes).find(k => k.includes(mainType)) || 'MIX';
      if (mainType === 'T') resultKey = 'IIII'; // 特殊处理T
      
      const result = resultTypes[resultKey] || resultTypes.MIX;

      document.getElementById('question-container').parentElement.classList.add('hidden');
      document.getElementById('result-page').classList.remove('hidden');

      document.getElementById('type-badge').innerHTML = result.title;
      document.getElementById('type-badge').className = `inline-block px-6 py-2 bg-gradient-to-r ${result.color} rounded-2xl text-lg font-bold mb-6`;
      document.getElementById('result-title').textContent = result.title;
      document.getElementById('result-desc').textContent = result.desc;

      // 显示部分分数
      document.getElementById('score-s').textContent = scores.S;
      document.getElementById('score-l').textContent = scores.L;
      document.getElementById('score-e').textContent = scores.E;
    }

    function generateShareImage() {
      const card = document.getElementById('result-card');
      html2canvas(card, { scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = '我的SBTI精神鉴定.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    function restart() {
      currentQuestion = 0;
      scores = { S:0, L:0, A:0, E:0, I:0, T:0 };
      document.getElementById('result-page').classList.add('hidden');
      document.getElementById('question-container').parentElement.classList.remove('hidden');
      renderQuestion();
    }

    // 开始
    renderQuestion();
  </script>
</body>
</html>
