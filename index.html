<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI | 精神状态鉴定仪</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; }
    .option-card { transition: all 0.3s; }
    .option-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen">
  <div id="main-page" class="max-w-lg mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    <!-- Header -->
    <div class="p-6 border-b border-zinc-200">
      <h1 class="text-4xl font-bold text-violet-600">SBTI</h1>
      <p class="text-zinc-500 mt-1">精神状态鉴定仪</p>
    </div>

    <!-- Progress -->
    <div class="px-6 pt-6">
      <div class="flex justify-between text-sm text-zinc-500 mb-2">
        <span id="progress-text">1 / 12</span>
        <span class="text-violet-600 font-medium">检测中</span>
      </div>
      <div class="h-1.5 bg-zinc-200 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-violet-600 w-1/12 transition-all duration-500"></div>
      </div>
    </div>

    <!-- Question -->
    <div class="flex-1 p-6">
      <div class="mb-8">
        <span class="inline-block px-5 py-2 bg-violet-100 text-violet-700 text-sm font-medium rounded-2xl">第 <span id="q-number">1</span> 题</span>
      </div>
      <h2 id="question-text" class="text-2xl leading-relaxed font-medium text-zinc-800"></h2>

      <div id="options" class="mt-10 space-y-4"></div>
    </div>

    <div class="p-6 text-center text-xs text-zinc-400 border-t">
      真实 · 扎心 · 不装
    </div>
  </div>

  <!-- Result Page -->
  <div id="result-page" class="hidden fixed inset-0 bg-white flex flex-col overflow-auto">
    <div class="flex-1 p-8">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-violet-600">鉴定完成</h1>
        <p class="text-zinc-500 mt-2">你的2026精神状态报告</p>
      </div>
      
      <div id="result-card" class="bg-white border border-zinc-200 rounded-3xl p-8 shadow">
        <div id="type-badge" class="inline-block px-6 py-2.5 rounded-2xl text-xl font-bold mb-6"></div>
        <h2 id="result-title" class="text-3xl font-bold mb-4"></h2>
        <p id="result-desc" class="text-zinc-600 leading-relaxed text-[17px]"></p>
        
        <div class="mt-10 pt-6 border-t grid grid-cols-3 gap-4 text-center">
          <div><div class="text-3xl font-bold text-violet-600" id="score-s">0</div><div class="text-xs text-zinc-500">直接</div></div>
          <div><div class="text-3xl font-bold text-amber-600" id="score-l">0</div><div class="text-xs text-zinc-500">躺平</div></div>
          <div><div class="text-3xl font-bold text-rose-600" id="score-e">0</div><div class="text-xs text-zinc-500">阴阳</div></div>
        </div>

        <div class="mt-8 pt-6 border-t border-dashed text-center">
          <p class="text-sm text-zinc-500 mb-3">扫码测试你的精神状态</p>
          <img id="qrcode" src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https://huiweixuan61406-beep.github.io/index.html" 
               class="mx-auto rounded-2xl shadow" alt="二维码">
        </div>
      </div>
    </div>

    <div class="p-6 border-t border-zinc-200 space-y-3 sticky bottom-0 bg-white">
      <button onclick="generateShareImage()" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
        <i class="fa-solid fa-share-nodes"></i> 保存分享图到相册
      </button>
      <button onclick="restart()" class="w-full bg-zinc-100 hover:bg-zinc-200 py-4 rounded-2xl">
        重新测试
      </button>
    </div>
  </div>

  <script>
    // 12个问题
    const questions = [
      { q: "被拉进一个陌生人拼团砍价群，天天@你帮忙助力，你会？", a: [{ t: "直接退群，懒得浪费一秒钟", v: "L" }, { t: "回一句'滚出去别@我，爱谁谁'", v: "S" }, { t: "默默屏蔽群消息，当这群人不存在", v: "A" }, { t: "发个'你妈死了'的表情包再退群", v: "E" }] },
      { q: "亲戚在家族群里@你问'什么时候带对象回家结婚生娃啊'，你会？", a: [{ t: "直接回'等你孙子结婚的时候再说'", v: "I" }, { t: "拉黑+退出家族群，一了百了", v: "S" }, { t: "假装没看见，继续刷视频", v: "L" }, { t: "发'关你屁事'然后@全家嘲讽", v: "T" }] },
      { q: "朋友圈有人晒新房新车还配文'普通家庭的普通幸福'，你刷到后？", a: [{ t: "点赞后立刻拉黑，省得恶心", v: "S" }, { t: "评论'凡尔赛是吧？真会玩'", v: "I" }, { t: "心里MMP一声，划走不看", v: "L" }, { t: "截图发到自己小群里群嘲", v: "E" }] },
      { q: "老板在群里发'今晚加班，算你们加班费'但从来不给，你会？", a: [{ t: "直接回'我有事走不了'然后下线", v: "S" }, { t: "假装没看到，继续摸鱼", v: "L" }, { t: "在心里骂一句'画大饼王八蛋'", v: "A" }, { t: "发个'领导牛逼'的表情包阴阳", v: "I" }] },
      { q: "聚餐时有人一直给你倒酒说'不喝就是不给面子'，你会？", a: [{ t: "直接把杯子倒扣桌上'我不喝'", v: "S" }, { t: "假笑说'我酒精过敏'然后继续吃菜", v: "A" }, { t: "心里骂娘但还是喝了", v: "L" }, { t: "回'那我就不给你面子了'直接走人", v: "E" }] },
      { q: "地铁上有人大声外放短视频还抖腿，你会？", a: [{ t: "瞪他一眼然后戴耳机假装听不见", v: "A" }, { t: "直接吼'把声音关了行吗！'", v: "S" }, { t: "拍视频发朋友圈吐槽定位", v: "E" }, { t: "默默换个车厢，懒得吵", v: "L" }] },
      { q: "前任突然点赞你三年前的朋友圈，你会？", a: [{ t: "立刻拉黑删除，永不往来", v: "S" }, { t: "点赞回去然后发'有病？'", v: "I" }, { t: "心里恶心一下，假装没看见", v: "A" }, { t: "截图发给闺蜜群嘲前任", v: "E" }] },
      { q: "快递员半夜12点打电话催你签收，你会？", a: [{ t: "接起来就骂'明天再打，老子睡了'", v: "S" }, { t: "直接挂断然后拉黑号码", v: "L" }, { t: "回短信'明天再说'继续睡", v: "A" }, { t: "接起来阴阳'你妈半夜给你打电话你开心吗'", v: "I" }] },
      { q: "公司团建强制要求每个人上台表演才艺，你会？", a: [{ t: "直接说'我不表演，你们玩'然后坐着", v: "S" }, { t: "找借口提前溜走", v: "L" }, { t: "心里一万句MMP但还是上去尬演", v: "A" }, { t: "上台唱一首《凉凉》阴阳全场", v: "E" }] },
      { q: "朋友圈有人发'求赞求投票帮我冲KPI'，你会？", a: [{ t: "直接屏蔽朋友圈，永不看", v: "L" }, { t: "评论'自己努力去，别求爷爷告奶奶'", v: "S" }, { t: "假装没看见，划走", v: "A" }, { t: "点赞后私信'下次别发了，恶心'", v: "I" }] },
      { q: "客服电话打来说'您有一笔逾期，请及时处理'其实是推销贷款，你会？", a: [{ t: "接起来就骂'你全家都逾期'然后挂", v: "S" }, { t: "直接拉黑号码永不接", v: "L" }, { t: "礼貌说'不需要'然后挂断", v: "A" }, { t: "接起来录音发到网上吐槽", v: "E" }] },
      { q: "外卖骑手打电话让你下楼拿餐，你明明备注了放门口，他还一直催，你会？", a: [{ t: "接起来就怼'备注看不懂吗？放门口就行！'", v: "S" }, { t: "回'放门口我自己下来拿，别催了'", v: "I" }, { t: "心里骂一句但还是下去拿", v: "L" }, { t: "直接挂断不接，让他一直等", v: "E" }] }
    ];

    const resultTypes = {
      "SSSS": { title: "社死终结者", desc: "直接、真实、暴躁。你最讨厌虚伪和浪费时间，生活里就是干就完事儿了。", color: "bg-red-100 text-red-700" },
      "LLLL": { title: "顶级躺平大师", desc: "能不动就不动，能不吵就不吵。内心永远在说：关我屁事。", color: "bg-blue-100 text-blue-700" },
      "EEEE": { title: "阴阳怪气王", desc: "表面云淡风轻，实际输出顶级阴阳。嘴上不说，心里全是损招。", color: "bg-amber-100 text-amber-700" },
      "AAAA": { title: "社恐内耗冠军", desc: "表面最乖，内心把对方骂一万遍。默默承受一切的精神内耗选手。", color: "bg-zinc-200 text-zinc-700" },
      "IIII": { title: "毒舌观察家", desc: "看透一切，但很少直接撕破脸。用最礼貌的方式说最狠的话。", color: "bg-purple-100 text-purple-700" },
      "SELI": { title: "精神分裂选手", desc: "时而暴躁时而躺平，时而阴阳时而社恐，复杂的当代年轻人。", color: "bg-violet-100 text-violet-700" },
      "SLEE": { title: "嘴硬心软型", desc: "表面凶巴巴，实际最怕麻烦。怼完人后自己默默反省。", color: "bg-orange-100 text-orange-700" },
      "MIX":  { title: "当代精神病", desc: "又社恐又社牛，又想躺平又想内卷，精神状态永远在线的真实人类。", color: "bg-violet-100 text-violet-700" }
    };

    let currentQuestion = 0;
    let scores = { S:0, L:0, A:0, E:0, I:0, T:0 };

    function renderQuestion() {
      const q = questions[currentQuestion];
      document.getElementById("q-number").textContent = currentQuestion + 1;
      document.getElementById("question-text").textContent = q.q;
      document.getElementById("progress-text").textContent = `${currentQuestion + 1} / 12`;
      document.getElementById("progress-bar").style.width = `${((currentQuestion + 1) / 12) * 100}%`;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.a.forEach(option => {
        const btn = document.createElement("div");
        btn.className = "option-card bg-white border border-zinc-200 hover:border-violet-400 rounded-2xl p-6 cursor-pointer text-lg";
        btn.textContent = option.t;
        btn.onclick = () => selectAnswer(option.v);
        optionsDiv.appendChild(btn);
      });
    }

    function selectAnswer(value) {
      if (value) scores[value]++;
      currentQuestion++;
      if (currentQuestion < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      let maxScore = Math.max(...Object.values(scores));
      let main = Object.keys(scores).find(k => scores[k] === maxScore) || "MIX";
      let resultKey = Object.keys(resultTypes).find(k => k.includes(main)) || "MIX";
      if (main === "T") resultKey = "IIII";

      const result = resultTypes[resultKey];

      document.getElementById("main-page").classList.add("hidden");
      document.getElementById("result-page").classList.remove("hidden");

      document.getElementById("type-badge").className = `inline-block px-6 py-2.5 ${result.color} rounded-2xl text-xl font-bold mb-6`;
      document.getElementById("type-badge").textContent = result.title;
      document.getElementById("result-title").textContent = result.title;
      document.getElementById("result-desc").textContent = result.desc;

      document.getElementById("score-s").textContent = scores.S;
      document.getElementById("score-l").textContent = scores.L;
      document.getElementById("score-e").textContent = scores.E;
    }

    function generateShareImage() {
      html2canvas(document.getElementById("result-card"), {scale: 2, backgroundColor: "#ffffff"}).then(canvas => {
        const link = document.createElement("a");
        link.download = "我的SBTI精神状态鉴定.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }

    function restart() {
      currentQuestion = 0;
      scores = { S:0, L:0, A:0, E:0, I:0, T:0 };
      document.getElementById("result-page").classList.add("hidden");
      document.getElementById("main-page").classList.remove("hidden");
      renderQuestion();
    }

    // 启动
    window.onload = renderQuestion;
  </script>
</body>
</html>
